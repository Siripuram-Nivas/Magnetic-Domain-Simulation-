[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[runner]
# Prevents the entire script from rerunning on every widget interaction
# (individual widget updates are handled via session_state)
magicEnabled = false

[theme]
base = "dark"
primaryColor = "#FF4500"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1d24"
textColor = "#fafafa"
font = "monospace"
